<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMEGA OPS - Business OS</title>
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk9NRUdBIE9QUyIsCiAgInNob3J0X25hbWUiOiAiT01FR0EiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMGZmMDAiLAogICJpY29ucyI6IFt7InNyYyI6Imh0dHBzOi8vaS5pbWdyLmNvbS9QcTg5eFZQLnBuZyIsInNpemVzIjoiMTkyeDE5MiIsInR5cGUiOiJpbWFnZS9wbmciIH1dCn0=">
<meta name="theme-color" content="#00ff00">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
:root{--bg:#000000;--card:#0a0a0a;--accent:#00ff00;--accent2:#00d4ff;--gold:#FFD700;--text:#ffffff;--muted:#888;--border:#1a1a1a;--gradient:linear-gradient(135deg,#00ff00 0%,#00d4ff 100%);}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.glow{box-shadow:0 0 20px rgba(0,255,0,0.3)}
.header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:15px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.role-select{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;background:radial-gradient(circle at center,#001100 0%,#000 100%)}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px;max-width:900px}
.role-card{background:var(--card);border:2px solid var(--border);padding:40px 20px;border-radius:20px;text-align:center;cursor:pointer;transition:0.3s}.role-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 20px 40px rgba(0,255,0,0.2)}
.role-card h3{font-size:20px;margin:15px 0}
.nav{position:sticky;top:70px;z-index:99;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);display:flex;gap:10px;padding:15px;overflow-x:auto}
.tab{padding:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;font-weight:600;white-space:nowrap;transition:0.2s}.tab.active{background:var(--gradient);color:#000}
.container{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:15px;animation:fadeIn 0.3s}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}}
.btn{background:var(--gradient);color:#000;border:none;padding:14px 24px;border-radius:12px;font-weight:800;cursor:pointer;width:100%;font-size:15px;transition:0.2s}.btn:hover{transform:scale(1.02)}
.btn-secondary{background:#1a1a1a;color:var(--text);border:1px solid var(--border)}
.input{width:100%;padding:14px;background:#111;border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;margin:8px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px}
.ticket{border-left:4px solid var(--accent)}
.qr{margin:15px auto;display:block}
.sync{position:fixed;top:20px;right:20px;background:var(--accent);color:#000;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:800;z-index:999}
#installBtn{position:fixed;bottom:20px;right:20px;background:var(--gold);color:#000;padding:16px 24px;border-radius:50px;font-weight:800;display:none;z-index:999;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,215,0,0.7)}100%{box-shadow:0 0 0 20px rgba(255,215,0,0)}}
.service-item{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111;border-radius:12px;margin:8px 0}
.feed-img{width:100%;border-radius:12px;margin:10px 0}
@media(max-width:768px){.role-grid{grid-template-columns:1fr}}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

<div class="sync" id="syncStatus">🟡 CONNECTING</div>
<button id="installBtn" onclick="installPWA()">📲 INSTALL APP</button>

<!-- ROLE SELECT -->
<div class="role-select" id="roleSelect">
  <h1 class="logo">OMEGA OPS</h1>
  <p style="color:var(--muted)">5 STAR BUSINESS OPERATING SYSTEM</p>
  <div class="role-grid">
    <div class="role-card glow" onclick="selectRole('Manager')">
      <div style="font-size:50px">👑</div>
      <h3>MANAGER</h3>
      <p style="color:var(--muted)">Full Control</p>
    </div>
    <div class="role-card" onclick="selectRole('Reception')">
      <div style="font-size:50px">📋</div>
      <h3>RECEPTION</h3>
      <p style="color:var(--muted)">Tickets + Check-in</p>
    </div>
    <div class="role-card" onclick="selectRole('Guest')">
      <div style="font-size:50px">🛒</div>
      <h3>GUEST</h3>
      <p style="color:var(--muted)">Menu + Order</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
  <div class="header">
    <div class="logo">OMEGA OPS</div>
    <div>Role: <span id="roleBadge" style="color:var(--accent)">Manager</span></div>
  </div>

  <div class="nav" id="navTabs">
    <div class="tab active" onclick="showTab('services')">🍽️ SERVICES</div>
    <div class="tab" onclick="showTab('tickets')">🎫 TICKETS</div>
    <div class="tab" onclick="showTab('feed')">📢 NEWSFEED</div>
    <div class="tab" onclick="showTab('invoices')">🧾 INVOICES</div>
  </div>

  <div class="container">
    <!-- SERVICES TAB -->
    <div id="services">
      <div class="card" id="serviceAdmin" style="display:none">
        <h3>Add Service/Product</h3>
        <input class="input" id="sName" placeholder="Product Name - Chicken & Chips">
        <input class="input" id="sPrice" type="number" placeholder="Price R">
        <input class="input" id="sImg" placeholder="Image URL">
        <select class="input" id="sCategory">
          <option>Restaurant</option><option>Night Club</option><option>Pool</option>
          <option>Car Wash</option><option>Guest House</option><option>Liquor</option><option>Events</option>
        </select>
        <button class="btn" onclick="addService()">Add Product</button>
      </div>
      <div class="grid" id="servicesList"></div>
    </div>

    <!-- TICKETS TAB -->
    <div id="tickets" style="display:none">
      <div class="card" id="ticketAdmin">
        <h3>Create Ticket</h3>
        <input class="input" id="tName" placeholder="Guest Name">
        <input class="input" id="tPhone" placeholder="Phone 076...">
        <select class="input" id="tType">
          <option>Pool Entry - R50</option><option>VIP Table - R500</option>
          <option>Guest House Night - R800</option><option>Event Ticket - R200</option>
        </select>
        <button class="btn" onclick="createTicket()">Create & WhatsApp Ticket</button>
      </div>
      <div id="ticketsList"></div>
    </div>

    <!-- NEWSFEED TAB -->
    <div id="feed" style="display:none">
      <div class="card" id="feedAdmin" style="display:none">
        <h3>Post to Newsfeed</h3>
        <textarea class="input" id="fText" rows="3" placeholder="DJ Tonight! New Specials!"></textarea>
        <input class="input" id="fImg" placeholder="Image URL optional">
        <button class="btn" onclick="createPost()">POST NOW</button>
      </div>
      <div id="feedList"></div>
    </div>

    <!-- INVOICES TAB -->
    <div id="invoices" style="display:none">
      <div class="card">
        <h3>Create Invoice</h3>
        <input class="input" id="iName" placeholder="Client Name">
        <input class="input" id="iPhone" placeholder="Client Phone">
        <div id="invoiceItems"></div>
        <button class="btn-secondary" onclick="addInvoiceItem()">+ Add Item</button>
        <button class="btn" onclick="generateInvoice()">Generate PDF + WhatsApp</button>
      </div>
      <div id="invoicesList"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, push, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// CONFIG - REPLACE WITH YOURS
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "omega---dms.firebaseapp.com",
  databaseURL: "https://omega---dms-default-rtdb.firebaseio.com",
  projectId: "omega---dms",
  storageBucket: "omega---dms.appspot.com",
  messagingSenderId: "123",
  appId: "1:123:web:abc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const COMPANY_WHATSAPP = "27682547352";

let currentRole = 'Guest';
let services = []; let tickets = []; let feed = []; let invoices = [];

window.selectRole = (role)=>{
  currentRole=role;
  document.getElementById('roleSelect').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('roleBadge').innerText=role;
  document.getElementById('serviceAdmin').style.display = role==='Manager'?'block':'none';
  document.getElementById('feedAdmin').style.display = role==='Manager'?'block':'none';
  document.getElementById('ticketAdmin').style.display = (role==='Manager'||role==='Reception')?'block':'none';
  loadAll();
}

window.showTab = (tab)=>{
  ['services','tickets','feed','invoices'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(tab).style.display='block';
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
}

function loadAll(){
  onValue(ref(db,'services'),s=>{services=s.val()?Object.values(s.val()):[];renderServices()});
  onValue(ref(db,'tickets'),s=>{tickets=s.val()?Object.keys(s.val()).map(k=>({id:k,...s.val()[k]})).reverse():[];renderTickets()});
  onValue(ref(db,'feed'),s=>{feed=s.val()?Object.values(s.val()).reverse():[];renderFeed()});
  document.getElementById('syncStatus').innerText='🟢 LIVE';
}

// SERVICES
window.addService=()=>{push(ref(db,'services'),{name:sName.value,price:sPrice.value,img:sImg.value,cat:sCategory.value})}
function renderServices(){
  servicesList.innerHTML=services.map(s=>`
    <div class="card">
      <img src="${s.img}" class="feed-img">
      <h4>${s.name}</h4>
      <p style="color:var(--accent)">R${s.price}</p>
      <button class="btn" onclick="orderWhatsApp('${s.name}',${s.price})">Order via WhatsApp</button>
    </div>
  `).join('');
}
window.orderWhatsApp=(name,price)=>{window.open(`https://wa.me/${COMPANY_WHATSAPP}?text=Order: ${name} R${price}`,'_blank')}

// TICKETS
window.createTicket=()=>{const t={name:tName.value,phone:tPhone.value,type:tType.value,created:Date.now()};push(ref(db,'tickets'),t);window.open(`https://wa.me/27${tPhone.value.replace(/^0/,'')}?text=*TICKET*%0A${t.name}%0A${t.type}`,'_blank')}
function renderTickets(){
  ticketsList.innerHTML=tickets.map(t=>`
    <div class="card ticket">
      <h4>${t.name}</h4><p>${t.type}</p>
      <canvas id="qr_${t.id}" class="qr"></canvas>
      <button class="btn-secondary" onclick="remove(ref(db,'tickets/${t.id}'))">Delete</button>
    </div>
  `).join('');
  tickets.forEach(t=>QRCode.toCanvas(document.getElementById(`qr_${t.id}`),t.id,{width:120}));
}
setInterval(()=>{tickets.forEach(t=>{if(Date.now()-t.created>86400000)remove(ref(db,'tickets/'+t.id))})},60000)

// FEED
window.createPost=()=>{push(ref(db,'feed'),{text:fText.value,img:fImg.value,time:Date.now()})}
function renderFeed(){
  feedList.innerHTML=feed.map(f=>`
    <div class="card">
      ${f.img?`<img src="${f.img}" class="feed-img">`:''}
      <p>${f.text}</p>
      <small style="color:var(--muted)">${new Date(f.time).toLocaleString()}</small>
    </div>
  `).join('');
}

// PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;installBtn.style.display='block'});
window.installPWA=()=>{deferredPrompt.prompt()}

// INVOICE - simplified for space
let invItems=0;
window.addInvoiceItem=()=>{invoiceItems.innerHTML+=`<input class="input" placeholder="Item ${++invItems}">`}
window.generateInvoice=()=>{alert('Invoice PDF + WhatsApp logic here')}

</script>
</body>
</html>
