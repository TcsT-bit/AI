// NEW: BANK AUTH SYSTEM - INJECTED
function seedCEO(){
  get(ref(db,`branches/${currentBranch}/staff`)).then(snap=>{
    if(!snap.exists()){
      push(ref(db,`branches/${currentBranch}/staff`),{name:"CEO",pin:"0000",role:"CEO",created:Date.now()});
      showToast("✅ Default CEO Created. Name: CEO PIN: 0000. CHANGE IT!");
    }
  })
}

window.bankLogin = () => {
  const name = loginName.value.trim();
  const pin = loginPin.value.trim();
  get(ref(db,`branches/${currentBranch}/staff`)).then(snap=>{
    const staffData = snap.val() || {};
    const user = Object.entries(staffData).find(([k,v])=> v.name === name && v.pin === pin);
    if(user){
      currentUserId = user[0];
      currentRole = user[1].role;
      localStorage.setItem('omega_user', JSON.stringify({id:currentUserId, role:currentRole}));
      loginGate.style.display = 'none';
      selectRole(currentRole); // Auto load their role
      showToast(`✅ Welcome ${name} - ${currentRole}`);
    } else { showToast('❌ Wrong Name or PIN') }
  })
}

window.logout = () => {
  localStorage.removeItem('omega_user');
  currentUserId = null; currentRole = 'Guest';
  location.reload();
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('omega_user');
  if(saved){
    const u = JSON.parse(saved);
    currentUserId = u.id; currentRole = u.role;
    loginGate.style.display = 'none';
    selectRole(currentRole);
  } else {
    seedCEO();
    roleSelect.style.display = 'none';
    mainApp.style.display = 'none';
  }
})

// NEW: ROLE PERMISSIONS - INJECT ONLY
function applyRolePermissions(){
  const isManager = currentRole === 'Manager' || currentRole === 'CEO';
  serviceAdmin.style.display = isManager? 'block' : 'none';
  feedAdmin.style.display = isManager? 'block' : 'none';
  ticketAdmin.style.display = ['Manager','CEO','Reception'].includes(currentRole)? 'block' : 'none';

  // Hide revenue for non-managers
  document.querySelectorAll('.stat-card')[0].style.display = isManager? 'block' : 'none';
  document.querySelector('#navTabs.tab:nth-child(9)').style.display = isManager? 'block' : 'none'; // Invoices tab

  // Add Delete button for staff if Manager/CEO
  if(isManager){
    staffList.querySelectorAll('.card').forEach(card=>{
      if(!card.querySelector('.delete-btn')){
        const btn = document.createElement('button');
        btn.className = 'btn-secondary delete-btn';
        btn.innerText = 'DELETE STAFF';
        btn.style.marginTop = '10px';
        btn.onclick = () => deleteStaff(card.dataset.id);
        card.appendChild(btn);
      }
    })
  }
}

window.deleteStaff = (id) => {
  if(confirm('Delete this staff?')){
    remove(ref(db,`branches/${currentBranch}/staff/${id}`));
    showToast('✅ Staff Deleted');
  }
}

// MODIFIED: selectRole to respect bank login
window.selectRole = (role)=>{
  if(currentRole!== role && currentRole!== 'CEO' && currentRole!== 'Manager') return; // Block role switching
  roleSelect.style.display='none'; mainApp.style.display='block';
  roleBadge.innerText=role;
  applyRolePermissions();
  if(role==='Reception') initScanner();
  loadAll(); if(document.getElementById('salesChart')) initChart(); initPresence();
}

// MODIFIED: renderStaff to add data-id for delete
function renderStaff(){
  staffList.innerHTML = Object.keys(staff).map(key=>{
    const s = staff[key];
    return `
    <div class="card" data-id="${key}">
      <h4>${s.name} <span class="badge">${s.role}</span> ${s.clockOut?'':'<span class="clock-badge">ON DUTY</span>'}</h4>
      <p>In: ${s.clockIn? new Date(s.clockIn).toLocaleTimeString():''}</p>
      <p>Out: ${s.clockOut? new Date(s.clockOut).toLocaleTimeString():''}</p>
      ${(currentRole==='Manager'||currentRole==='CEO')?`<input class="input" id="newPin_${key}" placeholder="New 4 Digit PIN"><button class="btn-secondary" onclick="updateStaffPin('${key}')">Update PIN</button>`:''}
    </div>
  `}).join('');
}

window.updateStaffPin = (id) => {
  const newPin = document.getElementById(`newPin_${id}`).value;
  if(newPin.length === 4) update(ref(db,`branches/${currentBranch}/staff/${id}`),{pin:newPin});
}

// MODIFIED: clockIn to use logged in user
window.clockIn = () => {
  if(!currentUserId) return showToast('❌ Login first');
  const time = Date.now();
  update(ref(db,`branches/${currentBranch}/staff/${currentUserId}`),{clockIn:time,clockOut:null});
  showToast(`✅ Clocked IN`);
}
window.clockOut = () => {
  if(!currentUserId) return showToast('❌ Login first');
  update(ref(db,`branches/${currentBranch}/staff/${currentUserId}`),{clockOut:Date.now()});
  showToast(`✅ Clocked OUT`);
}

// MODIFIED: Add Staff button for Manager/CEO

    <h4>Add New Staff</h4>
    <input class="input" id="newStaffName" placeholder="Staff Name">
    <input class="input" id="newStaffPin" placeholder="4 Digit PIN">
    <select class="input" id="newStaffRole"><option>Staff</option><option>Reception</option><option>Guest</option></select>
    <button class="btn" onclick="addStaff()">ADD STAFF</button>
  </div>`;
}

window.addStaff = () => {
  if(!(currentRole==='Manager'||currentRole==='CEO')) return;
  push(ref(db,`branches/${currentBranch}/staff`),{
    name:newStaffName.value, pin:newStaffPin.value, role:newStaffRole.value, clockIn:null, clockOut:null

}
