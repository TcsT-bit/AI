<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodTrack SA - Multilingual Local AI</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --user: #3b82f6;
    --ai: #334155;
    --text: #e2e8f0;
  }
    * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #334155;
  }
  header h3 { margin: 0; flex: 1; }
  select, button {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  button {
    background: var(--user);
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
 .user {
    align-self: flex-end;
    background: var(--user);
    color: white;
  }
 .ai {
    align-self: flex-start;
    background: var(--ai);
  }
  #inputBox {
    display: flex;
    padding: 12px;
    background: var(--panel);
    gap: 8px;
    border-top: 1px solid #334155;
  }
  input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    outline: none;
    background: var(--bg);
    color: white;
    font-size: 15px;
  }
</style>
</head>
<body>

<header>
  <h3>🇿🇦 FoodTrack SA Local AI</h3>

  <!-- Model Selection -->
  <select id="modelSelect" title="Model">
    <option value="qwen2.5:72b">Qwen 2.5 72B</option>
    <option value="llama3.1:70b">Llama 3.1 70B</option>
    <option value="deepseek-v3">DeepSeek V3</option>
    <option value="mistral-nemo:12b">Mistral Nemo 12B</option>
    <option value="phi3:14b">Phi-3 14B</option>
  </select>

  <!-- Language Selection - All 11 SA Official Languages -->
  <select id="langSelect" title="Language">
    <option value="en">English</option>
    <option value="zu">isiZulu</option>
    <option value="xh">isiXhosa</option>
    <option value="af">Afrikaans</option>
    <option value="st">Sesotho</option>
    <option value="tn">Setswana</option>
    <option value="ts">Xitsonga</option>
    <option value="ss">siSwati</option>
    <option value="nr">isiNdebele</option>
    <option value="ve">Tshivenda</option>
    <option value="nso">Sepedi</option>
  </select>

  <button id="clearBtn">Clear</button>
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="userInput" type="text" placeholder="Ask about food safety, spaza shops..." />
  <button id="sendBtn">Send</button>
</div>

<script>
// ====== CONFIG ======
const OLLAMA_URL = "http://localhost:11434/api/chat";

// System prompts for all 11 languages
const SYSTEM_PROMPTS = {
  en: "You are FoodTrack SA assistant. Help with food safety, spaza shops, and South African regulations. Be clear and practical.",
  zu: "Ungumsizi weFoodTrack SA. Siza ngezokuphepha kokudla, izitolo zespaza, nemithetho yaseNingizimu Afrika. Phendula kafushane nangokucacile.",
  xh: "Ungumncedisi weFoodTrack SA. Nceda ngezokhuseleko lokutya, iivenkile zespaza, kunye nemithetho yaseMzantsi Afrika.",
  af: "Jy is die FoodTrack SA assistent. Help met voedselveiligheid, spaza-winkels, en Suid-Afrikaanse regulasies.",
  st: "Oena mothusi wa FoodTrack SA. Thusa ka polokeho ya dijo, mabenkele a spaza, le melao ya Afrika Borwa.",
  tn: "O mothusi wa FoodTrack SA. Thusa ka tshireletsego ya dijo, mabenkele a spaza, le melao ya Aforika Borwa.",
  ts: "U mpfunani wa FoodTrack SA. Pfuna hi vuhlayiseki bya swakudya, tivhengele ta spaza, na milawu ya Afrika Dzonga.",
  ss: "Ungumsiti weFoodTrack SA. Sita ngekuphepha kwekudla, titolo te spaza, nemitsetfo yaseNingizimu Afrika.",
  nr: "Wena umsizi weFoodTrack SA. Siza ngezokuphepha kokudla, izitolo zespaza, nemithetho yaseNingizimu Afrika.",
  ve: "Ndi muhulungi wa FoodTrack SA. Thusa nga vhusiki ha zwiliwa, mihoro ya spaza, na milayo ya Afrika Tshipembe.",
  nso: "O mothusi wa FoodTrack SA. Thuša ka polokego ya dijo, mabenkele a spaza, le melao ya Afrika Borwa."
};

// Language names for display
const LANG_NAMES = {
  en: "English", zu: "isiZulu", xh: "isiXhosa", af: "Afrikaans", st: "Sesotho",
  tn: "Setswana", ts: "Xitsonga", ss: "siSwati", nr: "isiNdebele", ve: "Tshivenda", nso: "Sepedi"
};

const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const modelSelect = document.getElementById('modelSelect');
const langSelect = document.getElementById('langSelect');
const clearBtn = document.getElementById('clearBtn');

let messages = [];

// Initialize with system prompt
function resetMessages() {
  const lang = langSelect.value;
  messages = [{ role: "system", content: SYSTEM_PROMPTS[lang] }];
  chat.innerHTML = '';
  addMessage(`Switched to ${LANG_NAMES[lang]}. Ask me anything!`, 'ai');
}

function addMessage(content, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  messages.push({ role: "user", content: text });
  input.value = '';
  sendBtn.disabled = true;

  try {
    const res = await fetch(OLLAMA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: messages,
        stream: false,
        options: { temperature: 0.7 }
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const reply = data.message.content;

    addMessage(reply, 'ai');
    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    addMessage(`Error: ${err.message}\n\nMake sure Ollama is running: 'ollama serve'`, 'ai');
    console.error(err);
  } finally {
    sendBtn.disabled = false;
  }
}

// Event listeners
sendBtn.onclick = sendMessage;
input.onkeydown = (e) => {
  if (e.key === 'Enter' &&!e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};
langSelect.onchange = resetMessages;
clearBtn.onclick = resetMessages;

// Init
resetMessages();
</script>

</body>
</html>
